# Optional: run only the Python worker in Docker, then `cargo run` from ./backend
# (default TRANSLIT_MODE=local uses http://127.0.0.1:8081; override TRANSLIT_SERVICE_URL if needed).
#
#   docker compose up transliteration
#
services:
  transliteration:
    build:
      context: ./transliteration
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
